services:
  nginx:
    image: nginx:alpine
    ports:
      - '${PORT:-80}:80'
    volumes:
      - ./nginx/config:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    image: ghcr.io/chathousehq/chathouse:latest
    expose:
      - '3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MARIADB_USER:-chathouse}:${MARIADB_PASSWORD:-chathouse}@mariadb:3306/${MARIADB_DATABASE:-chathouse}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env (openssl rand -base64 32)}
      - CLIENT_URL=${CLIENT_URL:?Set CLIENT_URL in .env to your public URL (e.g. https://chat.yourdomain.com)}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-Chathouse <noreply@example.com>}
      - SMTP_MOCK=${SMTP_MOCK:-false}
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ghcr.io/chathousehq/chathouse:latest
    command: ['node', 'apps/worker/dist/index.js']
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MARIADB_USER:-chathouse}:${MARIADB_PASSWORD:-chathouse}@mariadb:3306/${MARIADB_DATABASE:-chathouse}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env (openssl rand -base64 32)}
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-rootpassword}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-chathouse}
      - MARIADB_USER=${MARIADB_USER:-chathouse}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD:-chathouse}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_data:
  uploads_data:
